<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>OTP Login Register</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
        rel='stylesheet'>

</head>

<body data-form="{{ active_form }}">

    <div class="container">

        <!-- LOGIN -->

        <div class="form-box login">

            <form method="POST">

                <h1>Login</h1>

                <!-- USERNAME -->

                <div class="input-box">

                    <input type="text"
                        name="login_user"
                        value="{{ saved_login_user }}"
                        placeholder="Username / Phone"
                        required>

                    <i class='bx bxs-user'></i>

                </div>

                <!-- PASSWORD -->

                <div class="input-box">

                    <input type="password"
                        name="login_password"
                        value="{{ saved_login_password }}"
                        placeholder="Password"
                        required>

                    <i class='bx bxs-lock-alt'></i>

                </div>

                <!-- OTP -->

                <div class="input-box">

                    <input type="text"
                        name="login_otp"
                        placeholder="Enter OTP">

                    <i class='bx bxs-key'></i>

                </div>
<!-- CREATED BY SANDHU JI -->
                <!-- FORGOT PASSWORD -->

                <div class="forgot-link">

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <!-- BUTTONS -->

                <button type="submit"
                    name="send_login_otp"
                    class="btn">

                    Send OTP

                </button>

                <button type="submit"
                    name="verify_login_otp"
                    class="btn">

                    Login

                </button>

                <!-- MESSAGE -->

                <p class="message">
                    {{ message }}
                </p>

                <div class="message">

    {{ login_message }}

</div>

                <!-- TIMER -->

                <p id="timer"></p>

            </form>

        </div>

        <!-- REGISTER -->

        <div class="form-box register">

            <form method="POST">

                <h1>Registration</h1>

                <!-- USERNAME -->

<!-- SANDHU JI -->
                <div class="input-box">

                    <input type="text"
                        name="register_user"
                        value="{{ saved_register_user }}"
                        placeholder="Username"
                        required>

                    <i class='bx bxs-user'></i>

                </div>

                <!-- EMAIL -->

                <div class="input-box">

                    <input type="email"
                        name="register_email"
                        value="{{ saved_register_email }}"
                        placeholder="Email"
                        required>

                    <i class='bx bxs-envelope'></i>

                </div>

                <!-- PASSWORD -->

                <div class="input-box">

                    <input type="password"
                        name="register_password"
                        value="{{ saved_register_password }}"
                        placeholder="Strong Password"
                        required>

                    <i class='bx bxs-lock-alt'></i>

                </div>

                <!-- OTP -->
                 <!-- SANDHU JI -->

                <div class="input-box">

                    <input type="text"
                        name="register_otp"
                        placeholder="Enter OTP">

                    <i class='bx bxs-key'></i>

                </div>

                <!-- BUTTONS -->

                <button type="submit"
                    name="send_register_otp"
                    class="btn">

                    Send OTP

                </button>

                <button type="submit"
                    name="verify_register_otp"
                    class="btn">

                    Register

                </button>

                <!-- MESSAGE -->
<!-- SANDHU JI -->
                <p class="message">
                    {{ message }}
                </p>


                <div class="message">

    {{ register_message }}

</div>
                <!-- TIMER -->

                <p id="timer2"></p>

            </form>

        </div>
<!-- SANDHU -->
        <!-- TOGGLE -->

        <div class="toggle-box">

            <div class="toggle-panel toggle-left">
                <H1>SANDHU SECURE</H1>
                <h1>Hello, Welcome!</h1>

                <p>Don't have an account?</p>

                <button class="btn register-btn">
                    Register
                </button>

            </div>
            <!-- SANDHU JI -->

            <div class="toggle-panel toggle-right">

                <h1>Welcome Back!</h1>

                <p>Already have an account?</p>

                <button class="btn login-btn">
                    Login
                </button>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        Created by Sandhu ❤️

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
<!-- SANDHU JI -->
